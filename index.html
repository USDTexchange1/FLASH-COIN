<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLASH/COIN</title>

<style>

*{
box-sizing:border-box;
font-family:Arial;
}

body{
margin:0;
background:linear-gradient(135deg,#0f172a,#020617);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:95%;
max-width:420px;
background:#0f172a;
padding:25px;
border-radius:12px;
box-shadow:0 20px 60px rgba(0,0,0,0.7);
display:none;
}

.active{
display:block;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:none;
background:#1e293b;
color:white;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:8px;
background:linear-gradient(90deg,#22c55e,#4ade80);
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

.link{
color:#4ade80;
cursor:pointer;
}

.logout{
background:#ef4444;
}

</style>

</head>

<body>

<!-- REGISTRO -->

<div class="container active" id="register">

<h2>Registro</h2>

<input id="regUser" placeholder="Usuario">
<input id="regEmail" placeholder="Correo">
<input id="regPass" type="password" placeholder="Contraseña">
<input id="regPass2" type="password" placeholder="Confirmar contraseña">

<button id="registerBtn">Registrarse</button>

<p>¿Ya tienes cuenta?
<span class="link" id="goLogin">Iniciar sesión</span>
</p>

</div>

<!-- LOGIN -->

<div class="container" id="login">

<h2>Iniciar sesión</h2>

<input id="logUser" placeholder="Usuario">
<input id="logPass" type="password" placeholder="Contraseña">

<button id="loginBtn">Entrar</button>

<p>¿No tienes cuenta?
<span class="link" id="goRegister">Registrarse</span>
</p>

</div>

<!-- PANEL PRINCIPAL -->

<div class="container" id="dashboard">

<h2>FLASH/COIN</h2>

<p id="welcome"></p>

<p>Panel principal de usuario</p>

<button class="logout" id="logoutBtn">Cerrar sesión</button>

</div>

<script>

document.addEventListener("DOMContentLoaded", function(){

/* PANELES */

const registerBox = document.getElementById("register")
const loginBox = document.getElementById("login")
const dashboardBox = document.getElementById("dashboard")

function show(panel){

registerBox.classList.remove("active")
loginBox.classList.remove("active")
dashboardBox.classList.remove("active")

panel.classList.add("active")

}

/* BOTONES CAMBIO PANTALLA */

document.getElementById("goLogin").addEventListener("click", function(){

show(loginBox)

})

document.getElementById("goRegister").addEventListener("click", function(){

show(registerBox)

})

/* REGISTRO */

document.getElementById("registerBtn").addEventListener("click", function(){

let user = document.getElementById("regUser").value.trim()
let email = document.getElementById("regEmail").value.trim()
let pass = document.getElementById("regPass").value
let pass2 = document.getElementById("regPass2").value

if(!user || !email || !pass){

alert("Complete todos los campos")
return

}

if(pass !== pass2){

alert("Las contraseñas no coinciden")
return

}

let users = JSON.parse(localStorage.getItem("users")) || []

let exists = users.find(u => u.user === user)

if(exists){

alert("Usuario ya existe")
return

}

users.push({
user:user,
email:email,
pass:pass
})

localStorage.setItem("users", JSON.stringify(users))

localStorage.setItem("session", user)

showDashboard(user)

})

/* LOGIN */

document.getElementById("loginBtn").addEventListener("click", function(){

let user = document.getElementById("logUser").value.trim()
let pass = document.getElementById("logPass").value.trim()

let users = JSON.parse(localStorage.getItem("users")) || []

let found = users.find(u => u.user === user && u.pass === pass)

if(!found){

alert("Usuario o contraseña incorrectos")
return

}

localStorage.setItem("session", user)

showDashboard(user)

})

/* DASHBOARD */

function showDashboard(user){

document.getElementById("welcome").innerText = "Bienvenido " + user

show(dashboardBox)

}

/* LOGOUT */

document.getElementById("logoutBtn").addEventListener("click", function(){

localStorage.removeItem("session")

location.reload()

})

/* SESION AUTOMATICA */

let session = localStorage.getItem("session")

if(session){

showDashboard(session)

}

})

</script>

</body>
</html>
