<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLASH/COIN</title>

<style>

*{
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
margin:0;
min-height:100vh;
background:linear-gradient(135deg,#0f172a,#020617,#020617);
color:white;
display:flex;
align-items:center;
justify-content:center;
}

.container{
width:95%;
max-width:420px;
}

.card{
background:#0f172a;
padding:25px;
border-radius:14px;
box-shadow:0 10px 30px rgba(0,0,0,.6);
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-bottom:10px;
border:none;
border-radius:8px;
background:#020617;
color:white;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#16a34a;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#22c55e;
}

.link{
text-align:center;
margin-top:10px;
cursor:pointer;
color:#38bdf8;
}

.hidden{
display:none;
}

.networks{
display:grid;
gap:10px;
margin-top:10px;
}

.network{
padding:15px;
border-radius:10px;
background:#020617;
border:2px solid transparent;
cursor:pointer;
text-align:center;
}

.network.active{
border:2px solid #22c55e;
}

.top{
display:flex;
justify-content:space-between;
margin-bottom:15px;
}

.dashboard{
max-width:700px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

td,th{
border:1px solid #1e293b;
padding:8px;
text-align:center;
}

.toast{
position:fixed;
top:20px;
right:20px;
background:#020617;
padding:12px 18px;
border-radius:8px;
box-shadow:0 10px 20px rgba(0,0,0,.6);
opacity:0;
transform:translateY(-20px);
transition:.3s;
}

.toast.show{
opacity:1;
transform:translateY(0);
}

.copy{
margin-top:8px;
background:#2563eb;
}

</style>
</head>

<body>

<div class="container">

<!-- REGISTER -->

<div id="registerPanel" class="card">

<h2>Registro</h2>

<input id="regUser" placeholder="Usuario">
<input id="regEmail" placeholder="Correo">
<input id="regPass" type="password" placeholder="Contraseña">
<input id="regPass2" type="password" placeholder="Confirmar contraseña">

<button id="registerBtn">Crear Cuenta</button>

<div class="link" id="toLogin">Ya tengo cuenta</div>

<p style="text-align:center;margin-top:10px">
Usuarios registrados: <span id="userCount">0</span>
</p>

</div>

<!-- LOGIN -->

<div id="loginPanel" class="card hidden">

<h2>Iniciar sesión</h2>

<input id="loginUser" placeholder="Usuario">
<input id="loginPass" type="password" placeholder="Contraseña">

<button id="loginBtn">Entrar</button>

<div class="link" id="toRegister">Crear cuenta</div>

</div>

<!-- DASHBOARD -->

<div id="dashboardPanel" class="card dashboard hidden">

<div class="top">
<div id="welcome"></div>
<button id="logoutBtn">Salir</button>
</div>

<h3>Seleccionar Red</h3>

<div class="networks">

<div class="network" data-net="TRC20">USDT TRC20</div>
<div class="network" data-net="BEP20">USDT BEP20</div>
<div class="network" data-net="BTC">Bitcoin</div>

</div>

<button id="goDeposit" style="margin-top:15px">Continuar</button>

<h3>Historial</h3>

<table>
<thead>
<tr>
<th>Red</th>
<th>Depósito</th>
<th>Recibe</th>
</tr>
</thead>

<tbody id="history"></tbody>

</table>

</div>

<!-- DEPOSIT -->

<div id="depositPanel" class="card hidden">

<h3 id="selectedNet"></h3>

<label>Dirección depósito</label>

<input id="depositAddress"
value="0x3670a0bFfb8b8A6D42177807F8dFd369A3995b9e"
readonly>

<button class="copy" id="copyBtn">Copiar dirección</button>

<input id="wallet" placeholder="Tu dirección para recibir">
<input id="amount" type="number" placeholder="Cantidad USDT">

<input id="receive" placeholder="Recibirás" readonly>

<input id="hash" placeholder="Hash de transacción">

<button id="confirmDeposit">Confirmar depósito</button>

<button id="backDash" style="margin-top:10px;background:#1e293b">Volver</button>

</div>

</div>

<div id="toast" class="toast"></div>

<script>

document.addEventListener("DOMContentLoaded",function(){

const panels={
register:document.getElementById("registerPanel"),
login:document.getElementById("loginPanel"),
dashboard:document.getElementById("dashboardPanel"),
deposit:document.getElementById("depositPanel")
}

function show(p){
Object.values(panels).forEach(x=>x.classList.add("hidden"))
panels[p].classList.remove("hidden")
}

function toast(msg){
let t=document.getElementById("toast")
t.textContent=msg
t.classList.add("show")
setTimeout(()=>t.classList.remove("show"),3000)
}

function users(){
return JSON.parse(localStorage.getItem("users")||"[]")
}

function saveUsers(u){
localStorage.setItem("users",JSON.stringify(u))
updateCount()
}

function updateCount(){
document.getElementById("userCount").textContent=users().length
}

updateCount()

/* REGISTER */

document.getElementById("registerBtn").addEventListener("click",function(){

let u=document.getElementById("regUser").value.trim()
let e=document.getElementById("regEmail").value.trim()
let p=document.getElementById("regPass").value
let p2=document.getElementById("regPass2").value

if(!u||!e||!p||!p2){
toast("Completa todos los campos")
return
}

if(p!==p2){
toast("Las contraseñas no coinciden")
return
}

let list=users()

if(list.find(x=>x.user===u)){
toast("Usuario ya existe")
return
}

list.push({user:u,email:e,pass:p})

saveUsers(list)

toast("Registro exitoso")

setTimeout(()=>{

document.getElementById("regUser").value=""
document.getElementById("regEmail").value=""
document.getElementById("regPass").value=""
document.getElementById("regPass2").value=""

show("login")

},1500)

})

/* LOGIN */

document.getElementById("loginBtn").addEventListener("click",function(){

let u=document.getElementById("loginUser").value
let p=document.getElementById("loginPass").value

let user=users().find(x=>x.user===u && x.pass===p)

if(!user){
toast("Usuario o contraseña incorrectos")
return
}

localStorage.setItem("session",u)

loadDashboard()

})

document.getElementById("toLogin").addEventListener("click",()=>show("login"))
document.getElementById("toRegister").addEventListener("click",()=>show("register"))

function loadDashboard(){

let u=localStorage.getItem("session")

document.getElementById("welcome").textContent="Hola "+u

loadHistory()

show("dashboard")

}

/* LOGOUT */

document.getElementById("logoutBtn").addEventListener("click",function(){

localStorage.removeItem("session")

show("login")

})

/* NETWORK */

let selected=null

document.querySelectorAll(".network").forEach(n=>{

n.addEventListener("click",function(){

document.querySelectorAll(".network").forEach(x=>x.classList.remove("active"))

this.classList.add("active")

selected=this.dataset.net

})

})

document.getElementById("goDeposit").addEventListener("click",function(){

if(!selected){
toast("Selecciona una red")
return
}

document.getElementById("selectedNet").textContent="Red: "+selected

show("deposit")

})

/* COPY */

document.getElementById("copyBtn").addEventListener("click",function(){

let addr=document.getElementById("depositAddress")

navigator.clipboard.writeText(addr.value)

toast("Dirección copiada")

})

/* CALC */

document.getElementById("amount").addEventListener("input",function(){

let a=parseFloat(this.value)||0

document.getElementById("receive").value=a*5

})

/* VALID HASH */

function validHash(h){
return /^[A-Fa-f0-9]{64}$/.test(h)
}

function usedHashes(){
return JSON.parse(localStorage.getItem("hashes")||"[]")
}

/* VALID WALLET */

function validWallet(w){

if(selected==="TRC20") return w.startsWith("T")

if(selected==="BEP20") return w.startsWith("0x")

if(selected==="BTC") return w.startsWith("1")||w.startsWith("3")||w.startsWith("bc1")

}

/* DEPOSIT */

document.getElementById("confirmDeposit").addEventListener("click",function(){

let wallet=document.getElementById("wallet").value.trim()
let amount=parseFloat(document.getElementById("amount").value)
let hash=document.getElementById("hash").value.trim()

if(!wallet||!amount||!hash){
toast("Completa todos los campos")
return
}

if(amount<30){
toast("Depósito mínimo 30 USDT")
return
}

if(!validWallet(wallet)){
toast("Dirección inválida")
return
}

if(!validHash(hash)){
toast("Hash inválido")
return
}

let hashes=usedHashes()

if(hashes.includes(hash)){
toast("Hash ya utilizado")
return
}

toast("Depósito en procesamiento")

setTimeout(()=>{

hashes.push(hash)

localStorage.setItem("hashes",JSON.stringify(hashes))

saveDeposit(amount)

toast("Depósito confirmado")

loadHistory()

show("dashboard")

},2000)

})

function saveDeposit(amount){

let u=localStorage.getItem("session")

let key="history_"+u

let list=JSON.parse(localStorage.getItem(key)||"[]")

list.push({
net:selected,
deposit:amount,
receive:amount*5
})

localStorage.setItem(key,JSON.stringify(list))

}

function loadHistory(){

let u=localStorage.getItem("session")

let list=JSON.parse(localStorage.getItem("history_"+u)||"[]")

let tbody=document.getElementById("history")

tbody.innerHTML=""

list.forEach(x=>{

let tr=document.createElement("tr")

tr.innerHTML=`
<td>${x.net}</td>
<td>${x.deposit}</td>
<td>${x.receive}</td>
`

tbody.appendChild(tr)

})

}

document.getElementById("backDash").addEventListener("click",function(){
show("dashboard")
})

if(localStorage.getItem("session")){
loadDashboard()
}else{
show("register")
}

})

</script>

</body>
  </html>
