<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FLASH Platform</title>

<style>

*{
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
margin:0;
min-height:100vh;
background:linear-gradient(135deg,#020617,#020617,#0f172a);
display:flex;
align-items:center;
justify-content:center;
color:white;
}

.container{
width:95%;
max-width:420px;
}

.card{
background:#0f172a;
padding:25px;
border-radius:14px;
box-shadow:0 15px 40px rgba(0,0,0,.6);
}

h2,h3{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-bottom:10px;
border:none;
border-radius:8px;
background:#020617;
color:white;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#16a34a;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#22c55e;
}

.link{
text-align:center;
margin-top:10px;
color:#38bdf8;
cursor:pointer;
}

.hidden{
display:none;
}

.networks{
display:grid;
gap:10px;
margin-top:10px;
}

.network{
padding:15px;
border-radius:10px;
background:#020617;
border:2px solid transparent;
text-align:center;
cursor:pointer;
}

.network.active{
border:2px solid #22c55e;
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.dashboard{
max-width:700px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #1e293b;
padding:8px;
text-align:center;
}

.copy{
background:#2563eb;
margin-top:5px;
}

.toast{
position:fixed;
top:20px;
right:20px;
background:#020617;
padding:12px 20px;
border-radius:8px;
box-shadow:0 10px 20px rgba(0,0,0,.6);
opacity:0;
transform:translateY(-20px);
transition:.3s;
}

.toast.show{
opacity:1;
transform:translateY(0);
}

</style>
</head>

<body>

<div class="container">

<!-- REGISTER -->

<div id="registerPanel" class="card">

<h2>Crear Cuenta</h2>

<input id="regUser" placeholder="Usuario">
<input id="regEmail" placeholder="Correo">
<input id="regPass" type="password" placeholder="Contraseña">
<input id="regPass2" type="password" placeholder="Confirmar contraseña">

<button id="registerBtn">Registrarse</button>

<div class="link" id="goLogin">Ya tengo cuenta</div>

<p style="text-align:center;margin-top:10px">
Usuarios registrados: <span id="userCount">0</span>
</p>

</div>

<!-- LOGIN -->

<div id="loginPanel" class="card hidden">

<h2>Iniciar sesión</h2>

<input id="loginUser" placeholder="Usuario">
<input id="loginPass" type="password" placeholder="Contraseña">

<button id="loginBtn">Entrar</button>

<div class="link" id="goRegister">Crear cuenta</div>

</div>

<!-- DASHBOARD -->

<div id="dashboardPanel" class="card dashboard hidden">

<div class="top">
<div id="welcome"></div>
<button id="logoutBtn">Cerrar sesión</button>
</div>

<h3>Comprar FLASH</h3>

<div class="networks">

<div class="network" data-net="TRC20">
USDT TRC20
</div>

<div class="network" data-net="BEP20">
USDT BEP20
</div>

<div class="network" data-net="BTC">
Bitcoin
</div>

</div>

<button id="confirmNetwork" style="margin-top:15px">
Confirmar moneda
</button>

<h3>Historial</h3>

<table>

<thead>

<tr>
<th>Red</th>
<th>Pago</th>
<th>FLASH</th>
</tr>

</thead>

<tbody id="history"></tbody>

</table>

</div>

<!-- DEPOSIT -->

<div id="depositPanel" class="card hidden">

<h3 id="selectedTitle"></h3>

<p style="font-size:14px;opacity:.8">
Debe depositar la cantidad exacta en la dirección indicada.
Después pegue el hash de la transacción para validar su compra.
</p>

<label>Dirección de pago</label>

<input id="depositAddress" readonly>

<button class="copy" id="copyBtn">
Copiar dirección
</button>

<input id="wallet" placeholder="Tu dirección para recibir FLASH">

<input id="amount" type="number" placeholder="Cantidad a pagar">

<input id="receive" placeholder="FLASH que recibirás" readonly>

<input id="hash" placeholder="Hash de transacción">

<button id="confirmDeposit">Confirmar pago</button>

<button id="backBtn" style="background:#1e293b;margin-top:10px">
Volver
</button>

</div>

</div>

<div id="toast" class="toast"></div>

<script>

document.addEventListener("DOMContentLoaded",function(){

const TRC20="TJvpGB5oUdyFRPg6YrdwLt8SWgNo6GoKwx"
const BEP20="0x3670a0bFfb8b8A6D42177807F8dFd369A3995b9e"
const BTC="bc1q4ltapgnt3ujfevjsgs0zl5p0wqprxg594vvnqg"

const panels={
register:document.getElementById("registerPanel"),
login:document.getElementById("loginPanel"),
dashboard:document.getElementById("dashboardPanel"),
deposit:document.getElementById("depositPanel")
}

function show(panel){

Object.values(panels).forEach(p=>p.classList.add("hidden"))

panels[panel].classList.remove("hidden")

}

function toast(msg){

let t=document.getElementById("toast")

t.textContent=msg

t.classList.add("show")

setTimeout(()=>t.classList.remove("show"),3000)

}

function users(){

return JSON.parse(localStorage.getItem("users")||"[]")

}

function saveUsers(list){

localStorage.setItem("users",JSON.stringify(list))

updateCount()

}

function updateCount(){

document.getElementById("userCount").textContent=users().length

}

updateCount()

document.getElementById("registerBtn").addEventListener("click",function(){

let u=regUser.value.trim()
let e=regEmail.value.trim()
let p=regPass.value
let p2=regPass2.value

if(!u||!e||!p||!p2){
toast("Completa todos los campos")
return
}

if(p!==p2){
toast("Las contraseñas no coinciden")
return
}

let list=users()

if(list.find(x=>x.user===u)){
toast("Usuario ya existe")
return
}

list.push({user:u,email:e,pass:p})

saveUsers(list)

toast("Registro exitoso")

setTimeout(()=>show("login"),1500)

})

loginBtn.addEventListener("click",function(){

let u=loginUser.value.trim()
let p=loginPass.value.trim()

let user=users().find(x=>x.user===u && x.pass===p)

if(!user){
toast("Datos incorrectos")
return
}

localStorage.setItem("session",u)

loadDashboard()

})

goLogin.onclick=()=>show("login")
goRegister.onclick=()=>show("register")

function loadDashboard(){

let u=localStorage.getItem("session")

welcome.textContent="Hola "+u

loadHistory()

show("dashboard")

}

logoutBtn.onclick=function(){

localStorage.removeItem("session")

show("login")

}

let selected=null

document.querySelectorAll(".network").forEach(n=>{

n.addEventListener("click",function(){

document.querySelectorAll(".network").forEach(x=>x.classList.remove("active"))

this.classList.add("active")

selected=this.dataset.net

})

})

confirmNetwork.onclick=function(){

if(!selected){
toast("Selecciona una red")
return
}

let address=""

if(selected==="TRC20") address=TRC20
if(selected==="BEP20") address=BEP20
if(selected==="BTC") address=BTC

depositAddress.value=address

selectedTitle.textContent="Pago con "+selected

show("deposit")

}

copyBtn.onclick=function(){

navigator.clipboard.writeText(depositAddress.value)

toast("Dirección copiada")

}

amount.addEventListener("input",function(){

let a=parseFloat(this.value)||0

receive.value=a*12

})

function validHash(h){

return /^[A-Fa-f0-9]{64}$/.test(h)

}

confirmDeposit.onclick=function(){

let a=parseFloat(amount.value)
let h=hash.value.trim()

if(!a||!h){
toast("Completa los campos")
return
}

if(a<10){
toast("Depósito mínimo 10")
return
}

if(!validHash(h)){
toast("Hash inválido")
return
}

toast("Pago en verificación")

setTimeout(()=>{

saveDeposit(a)

toast("Compra confirmada")

loadHistory()

show("dashboard")

},2000)

}

function saveDeposit(a){

let u=localStorage.getItem("session")

let key="history_"+u

let list=JSON.parse(localStorage.getItem(key)||"[]")

list.push({
net:selected,
deposit:a,
receive:a*12
})

localStorage.setItem(key,JSON.stringify(list))

}

function loadHistory(){

let u=localStorage.getItem("session")

let list=JSON.parse(localStorage.getItem("history_"+u)||"[]")

history.innerHTML=""

list.forEach(x=>{

let tr=document.createElement("tr")

tr.innerHTML=`
<td>${x.net}</td>
<td>${x.deposit}</td>
<td>${x.receive}</td>
`

history.appendChild(tr)

})

}

backBtn.onclick=()=>show("dashboard")

if(localStorage.getItem("session")){
loadDashboard()
}else{
show("register")
}

})

</script>

</body>
  </html>
